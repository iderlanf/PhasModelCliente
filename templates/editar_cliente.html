<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente - Phas Models</title>
    
    <!-- Importação correta da fonte Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        /* Padronização global para Poppins */
        * {
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: url("{{ url_for('static', filename='fundo-phas.jpg') }}") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Logomarca no Topo */
        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .header-logo img {
            max-width: 200px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.97);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border-top: 6px solid #D63384;
        }

        h2 {
            /* Alterado de Playfair para Poppins Bold */
            font-weight: 700;
            color: #4A3B3B;
            margin-bottom: 25px;
            font-size: 1.8em;
            text-align: center;
            border-bottom: 2px solid #B76E79;
            padding-bottom: 10px;
        }

        .voltar {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #D63384;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .voltar:hover {
            color: #4A3B3B;
            transform: translateX(-5px);
        }

        form {
            display: grid;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px; /* Levemente menor para um ar mais moderno */
            font-weight: 700;
            color: #B76E79;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.3s;
            outline: none;
        }
        input:focus {
            border-color: #D63384;
            box-shadow: 0 0 8px rgba(214, 51, 132, 0.1);
        }

        button {
            margin-top: 10px;
            background: linear-gradient(45deg, #4A3B3B, #2c2424);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.4s;
        }
        button:hover {
            background: linear-gradient(45deg, #D63384, #B76E79);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
        }

        .id-label {
            color: #888;
            font-weight: 400; /* Poppins normal para o ID */
            font-size: 0.7em;
        }
    </style>
</head>
<body>

<div class="header-logo">
    <img src="{{ url_for('static', filename='logo-phas.png') }}" alt="Phas Model Logo">
</div>

<div class="container">
    <a href="/clientes" class="voltar">← Voltar para a Lista</a>
    
    <h2>Editar Perfil <span class="id-label">#{{ cliente.id }}</span></h2>
    
    <form method="POST">
        <div class="input-group">
            <label>Nome do Cliente / Empresa</label>
            <input type="text" name="nome" value="{{ cliente.nome }}" required>
        </div>
        
        <div class="input-group">
            <label>Telefone de Contato</label>
            <input type="text" name="telefone" value="{{ cliente.telefone }}">
        </div>
        
        <div class="input-group">
            <label>E-mail Corporativo</label>
            <input type="email" name="email" value="{{ cliente.email }}">
        </div>
        
        <div class="input-group">
            <label>Cidade</label>
            <input type="text" name="cidade" value="{{ cliente.cidade }}">
        </div>
        
        <div class="input-group">
            <label>Estado (UF)</label>
            <input type="text" name="estado" value="{{ cliente.estado }}">
        </div>
        
        <div class="input-group">
            <label>País</label>
            <input type="text" name="pais" value="{{ cliente.pais }}">
        </div>
        
        <button type="submit">Atualizar Cadastro</button>
    </form>
</div>

</body>
</html>
